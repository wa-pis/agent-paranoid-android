name: Feature request
description: Suggest a scoped improvement or new capability.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please keep requests safety-focused. Do not include production data, raw PII, secrets, or internal schema details.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or production-readiness problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CSV profiling
        - Trino MCP
        - Generator MCP
        - DatasetSpec
        - Deterministic generation
        - Validation
        - Agent workflow
        - Documentation
        - Release/security
        - Other
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety Considerations
      description: How should this preserve no-copy, no-PII, read-only SQL, and deterministic-generation guarantees?
    validations:
      required: true

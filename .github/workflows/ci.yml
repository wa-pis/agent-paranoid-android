name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.23"
          enable-cache: true

      - name: Install locked development environment
        run: uv sync --frozen --extra dev --python python

      - name: Audit Python dependencies
        run: uv run --frozen --extra dev python -m pip_audit --skip-editable

      - name: Run lint checks
        run: uv run --frozen --extra dev python -m ruff check src tests

      - name: Compile source and tests
        run: uv run --frozen --extra dev python -m compileall -q src tests

      - name: Run tests with coverage gate
        run: >-
          uv run --frozen --extra dev python -m pytest
          --cov=test_data_agent
          --cov-report=term-missing
          --cov-fail-under=85
